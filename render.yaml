services:
  # 1. Django Backend Web Service
  - type: web
    name: nexusflow-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    rootDir: backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://nexusflow-frontend.onrender.com

  # 2. React Frontend Static Site
  - type: web
    name: nexusflow-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      # Rewrite rule for React Router SPA navigation fallback
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nexusflow-backend.onrender.com
